<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Scribe | Aether Might Studios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AETHER MIGHT STUDIOS</h1>
        <p class="branding">AETHER SCRIBE FORGE v4.0</p>
    </header>

    <main class="container">
        <section class="prompt-box">
            <label>Describe your character vision:</label>
            <textarea id="vision-input" placeholder="e.g. My name is Raymoondo, a Stone Goliath Paladin who seeks justice..."></textarea>
            
            <div class="settings-row">
                <div class="input-unit">
                    <label>Level</label>
                    <input type="number" id="char-level" value="1" min="1">
                </div>
                <div class="input-unit">
                    <label>Setting</label>
                    <select id="setting-mode">
                        <option value="fantasy">High Fantasy</option>
                        <option value="scifi">Aetherized (Sci-Fi)</option>
                    </select>
                </div>
            </div>
            <button class="btn-main" onclick="generateDrafts()">FORGE CHARACTER DRAFTS</button>
        </section>

        <div id="loading" class="hidden">Consulting the Scribe...</div>

        <section class="forge-output" id="forge-output">
            </section>

        <section id="refine-ui" class="config-card hidden">
            <h3>Refine Selection</h3>
            <div class="settings-row">
                <select id="race-edit"></select>
                <select id="class-edit"></select>
            </div>
            <button class="btn-accent" onclick="lockCharacter()">LOCK TO VAULT & EXPORT</button>
            <pre id="json-export" class="hidden"></pre>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
